<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeopleCore HRMS - Login</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- Background Blurs -->
  <div class="bg-blur bg-blur-1"></div>
  <div class="bg-blur bg-blur-2"></div>

  <div class="login-wrapper">

    <!-- Logo -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <h1 class="brand-title">PeopleCore HRMS</h1>
      <p class="brand-subtitle">Human Resource Management System</p>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- Role Tabs -->
      <label class="field-label">Sign in as</label>
      <div class="role-tabs">
        <button class="role-tab active" data-role="hr" onclick="selectRole('hr')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>HR</span>
          <div class="role-dot"></div>
        </button>
        <button class="role-tab" data-role="admin" onclick="selectRole('admin')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span>Admin</span>
          <div class="role-dot"></div>
        </button>
        <button class="role-tab" data-role="employee" onclick="selectRole('employee')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          <span>Employee</span>
          <div class="role-dot"></div>
        </button>
      </div>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text" id="roleDesc">Human Resources</span>
        <div class="divider-line"></div>
      </div>

      <!-- Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">

        <!-- Email -->
        <div class="field-group">
          <label class="field-label" for="email">Email</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a0aec0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </div>
            <input
              type="email"
              id="email"
              class="neu-input"
              placeholder="Enter your email"
              autocomplete="email"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a0aec0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <input
              type="password"
              id="password"
              class="neu-input"
              placeholder="Enter your password"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="Toggle password visibility">
              <svg id="eyeOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a0aec0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eyeClosed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a0aec0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <!-- Remember + Forgot -->
        <div class="row-between">
          <label class="remember-label">
            <button type="button" class="neu-check" id="rememberBtn" onclick="toggleRemember()"></button>
            <span>Remember me</span>
          </label>
          <button type="button" class="link-btn">Forgot password?</button>
        </div>

        <!-- Error -->
        <div class="error-box" id="errorBox"></div>

        <!-- Submit -->
        <button type="submit" class="login-btn" id="loginBtn">
          <span id="btnText">Sign in as HR</span>
          <svg id="btnArrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          <div class="spinner" id="btnSpinner"></div>
        </button>
      </form>
    </div>

    <!-- Bottom -->
    <p class="bottom-text">Don't have an account? <button class="link-btn">Contact HR</button></p>
    <p class="footer-text">© 2025 PeopleCore HRMS. All rights reserved.</p>
  </div>

  <script src="login.js"></script>
</body>
</html>
